name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app for macOS
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PitchSpeed ${{ github.ref_name }}'
          releaseBody: |
            ## 下载说明

            ### Windows
            - 下载 `_setup.exe` 安装包（推荐，体积小）
            - 双击运行安装，按向导完成

            ### macOS
            - 下载 `.dmg` 文件
            - 打开后拖拽到 Applications 文件夹

            ---

            ## Download Instructions

            ### Windows
            - Download `_setup.exe` installer (recommended)
            - Double-click to install

            ### macOS
            - Download the `.dmg` file
            - Open and drag to Applications folder
          releaseDraft: true
          prerelease: false

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app for Windows
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PitchSpeed ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false